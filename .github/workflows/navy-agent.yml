name: Navy Agent Weekly

on:
  schedule:
    - cron: '0 9 * * 0'   # Runs every Sunday at 9 AM
  workflow_dispatch:      # allows manual run

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        env:
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          NAVY_URL: ${{ secrets.NAVY_URL }}
        run: python main.py
